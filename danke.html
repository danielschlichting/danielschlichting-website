<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root { --bordeaux: #6B1F3A; --terra: #C47B55; --cream: #FAF0E8; --dark: #1C1C1C; --gray: #888; }
html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--dark); }
nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; padding: 0 40px; display: flex; align-items: center; justify-content: space-between; height: 64px; background: rgba(250,240,232,0.92); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(107,31,58,0.08); }
.nav-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.45rem; font-weight: 700; color: var(--bordeaux); text-decoration: none; }
.hero { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 80px 24px 60px; position: relative; overflow: hidden; }
.hero::before { content: ''; position: absolute; top: -200px; left: 50%; transform: translateX(-50%); width: 600px; height: 600px; background: rgba(107,31,58,0.04); border-radius: 50%; pointer-events: none; }
.check { width: 72px; height: 72px; border-radius: 50%; background: var(--bordeaux); display: flex; align-items: center; justify-content: center; margin: 0 auto 32px; animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
.check svg { width: 32px; height: 32px; stroke: white; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; fill: none; stroke-dasharray: 50; stroke-dashoffset: 50; animation: drawCheck 0.4s ease 0.3s forwards; }
.eyebrow { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--terra); margin-bottom: 16px; opacity: 0; animation: fadeUp 0.6s ease 0.4s forwards; }
.title { font-family: 'Cormorant Garamond', serif; font-size: clamp(2.2rem, 5vw, 3.2rem); font-weight: 600; color: var(--bordeaux); line-height: 1.2; margin-bottom: 20px; opacity: 0; animation: fadeUp 0.6s ease 0.5s forwards; }
.subtitle { font-size: 1rem; color: var(--gray); line-height: 1.75; max-width: 420px; margin: 0 auto 32px; opacity: 0; animation: fadeUp 0.6s ease 0.6s forwards; }
.motto { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; font-style: italic; color: var(--bordeaux); margin-bottom: 48px; opacity: 0; animation: fadeUp 0.6s ease 0.7s forwards; }
.divider { width: 40px; height: 2px; background: var(--terra); margin: 0 auto 48px; opacity: 0; animation: fadeUp 0.6s ease 0.75s forwards; }
.btn { display: inline-block; background: var(--bordeaux); color: white; padding: 14px 32px; border-radius: 4px; font-size: 0.78rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; text-decoration: none; transition: background 0.2s, transform 0.2s; opacity: 0; animation: fadeUp 0.6s ease 0.8s forwards; }
.btn:hover { background: #4A1428; transform: translateY(-2px); }
@keyframes popIn { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
@keyframes drawCheck { to { stroke-dashoffset: 0; } }
@keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
footer { background: var(--dark); padding: 28px 40px; display: flex; justify-content: space-between; align-items: center; }
.footer-logo { font-family: 'Cormorant Garamond', serif; font-size: 1rem; font-weight: 600; color: white; }
.footer-copy { font-size: 0.7rem; color: rgba(255,255,255,0.25); }
@media (max-width: 768px) { nav { padding: 0 20px; } footer { padding: 24px 20px; flex-direction: column; gap: 10px; text-align: center; } }

.footer-social { display: flex; gap: 16px; align-items: center; }
.social-icon { color: rgba(255,255,255,0.4); transition: color 0.2s; display: flex; align-items: center; text-decoration: none; }
.social-icon:hover { color: #C47B55; }

.nav-logo-wrap { display: flex; align-items: center; gap: 6px; text-decoration: none; }
.nav-logo-img { width: 40px; height: 40px; object-fit: contain; }
</style>
</head>
