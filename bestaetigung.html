<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fast geschafft – Schlicht Kommunal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bordeaux: #6B1F3A; --sienna: #7A2030; --terra: #C47B55;
  --cream: #FAF0E8; --dark: #1C1C1C; --gray: #888;
}
html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--dark); }

nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  padding: 0 40px; display: flex; align-items: center;
  justify-content: space-between; height: 64px;
  background: rgba(250,240,232,0.92); backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(107,31,58,0.08);
}
.nav-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.45rem; font-weight: 700; color: var(--bordeaux); text-decoration: none; }

.hero {
  min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center; padding: 80px 24px 60px;
}

.icon {
  width: 72px; height: 72px; border-radius: 50%;
  background: var(--terra);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 32px;
  animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
}

.icon svg { width: 32px; height: 32px; fill: none; stroke: white; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

.eyebrow { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--terra); margin-bottom: 16px; opacity: 0; animation: fadeUp 0.6s ease 0.3s forwards; }

.title { font-family: 'Cormorant Garamond', serif; font-size: clamp(2rem, 5vw, 3rem); font-weight: 600; color: var(--bordeaux); line-height: 1.2; margin-bottom: 20px; opacity: 0; animation: fadeUp 0.6s ease 0.4s forwards; }

.subtitle { font-size: 1rem; color: var(--gray); line-height: 1.75; max-width: 400px; margin: 0 auto 16px; opacity: 0; animation: fadeUp 0.6s ease 0.5s forwards; }

.hint { font-size: 0.82rem; color: var(--gray); opacity: 0; animation: fadeUp 0.6s ease 0.6s forwards; margin-bottom: 48px; }
.hint strong { color: var(--bordeaux); }

.divider { width: 40px; height: 2px; background: var(--terra); margin: 0 auto 48px; opacity: 0; animation: fadeUp 0.6s ease 0.65s forwards; }

.btn { display: inline-block; background: var(--bordeaux); color: white; padding: 14px 32px; border-radius: 4px; font-size: 0.78rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; text-decoration: none; transition: background 0.2s, transform 0.2s; opacity: 0; animation: fadeUp 0.6s ease 0.7s forwards; }
.btn:hover { background: #4A1428; transform: translateY(-2px); }

@keyframes popIn { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
@keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

footer { background: var(--dark); padding: 28px 40px; display: flex; justify-content: space-between; align-items: center; }
.footer-logo { font-family: 'Cormorant Garamond', serif; font-size: 1rem; font-weight: 600; color: white; }
.footer-copy { font-size: 0.7rem; color: rgba(255,255,255,0.25); }

@media (max-width: 768px) {
  nav { padding: 0 20px; }
  footer { padding: 24px 20px; flex-direction: column; gap: 10px; text-align: center; }
}

.footer-social { display: flex; gap: 16px; align-items: center; }
.social-icon { color: rgba(255,255,255,0.4); transition: color 0.2s; display: flex; align-items: center; text-decoration: none; }
.social-icon:hover { color: #C47B55; }

.nav-logo-wrap { display: flex; align-items: center; gap: 6px; text-decoration: none; }
.nav-logo-img { width: 40px; height: 40px; object-fit: contain; }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo-wrap"><img src="logo-ds.png" alt="" class="nav-logo-img"><span class="nav-logo">Daniel Schlichting</span></a>
</nav>

<div class="hero">
  <div class="icon">
    <svg viewBox="0 0 24 24">
      <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
      <polyline points="22,6 12,13 2,6"/>
    </svg>

  <div class="eyebrow">Schlicht Kommunal</div>
  <h1 class="title">Fast geschafft.</h1>
  <p class="subtitle">Wir haben dir eine Bestätigungs-E-Mail geschickt. Bitte klick auf den Link darin – dann bist du dabei.</p>
  <p class="hint">Nichts angekommen? Schau kurz im <strong>Spam-Ordner</strong> nach.</p>

  <div class="divider"></div>

  <a href="index.html" class="btn">Zurück zur Startseite</a>
</div>

<footer>
  <div class="footer-logo">Daniel Schlichting</div>

    </a>

      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-4 0v7H10V9h4v2a6 6 0 0 1 6-3zM2 9h4v12H2z"/><circle cx="4" cy="4" r="2"/></svg>
    </a>
  
    <a href="https://www.facebook.com/share/1CPQHWAY4w/" target="_blank" rel="noopener" class="social-icon" aria-label="Facebook">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>
    </a>
  </div>
  <span class="footer-copy">© 2026 Daniel Schlichting · Schlicht Media</span>
</footer>

</body>
</html>
